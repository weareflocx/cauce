<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23F6F4EF'/%3E%3Cpath d='M4 8h24M4 13h24M4 18h24M4 23h24' stroke='%23101012' stroke-width='1.5'/%3E%3C/svg%3E" />
    <title>CAZ · CAUCE</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div id="wordmark">CAZ<span> · MOTOR CAUCE · v0</span></div>
        <nav id="modes">
          <button data-mode="patron" class="active">PATRÓN</button>
          <button data-mode="retrato">RETRATO</button>
          <button data-mode="forma">FORMA</button>
        </nav>
        <div id="exports">
          <button id="btn-svg" title="Exportar SVG vectorial">SVG</button>
          <button id="btn-png" title="Exportar PNG al tamaño del lienzo × escala">PNG</button>
          <div id="png-scale" title="Escala del PNG exportado">
            <button data-scale="1">1×</button>
            <button data-scale="2" class="active">2×</button>
            <button data-scale="4">4×</button>
          </div>
        </div>
      </header>
      <main>
        <div id="stage">
          <svg id="lienzo" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
          <canvas id="lienzo-canvas" width="2400" height="1800"></canvas>
          <div id="drop-hint">
            <div class="hint-box">
              <p>ARRASTRA UNA IMAGEN AL LIENZO</p>
              <button id="btn-file">O ELIGE UN ARCHIVO</button>
              <p class="nota">SE PROCESA EN TU NAVEGADOR · NADA SE SUBE</p>
            </div>
          </div>
        </div>
        <aside id="panel"></aside>
      </main>
    </div>
    <input type="file" id="file-input" accept="image/*" hidden />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
